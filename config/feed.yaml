# ─────────────────────────────────────────────────────────────────────────────
# YOUR PERSONAL FEED
# Refined configuration - pulls ~100 posts/day max
# Runs once daily at 7am PT
# ─────────────────────────────────────────────────────────────────────────────


# ─── KEY PEOPLE ───────────────────────────────────────────────────────────────
# High-signal accounts (5 tweets each = ~25 total)

accounts:
  - karpathy         # AI/LLMs
  - rauchg           # Vercel CEO
  - GergelyOrosz     # Engineering media
  - levie            # Box CEO, enterprise AI
  - emollick         # AI professor


# ─── TOPIC PRESETS ────────────────────────────────────────────────────────────
# Using presets from config/presets.yaml
# Total: ~75 posts from topics

presets:
  - ai_engineering    # LLMs, coding tools, AI dev
  - design_eng        # UI/UX, design systems
  - dev_tools         # Platforms, databases, tooling
  - startups          # Founders, product, venture


# ─── CUSTOM TOPICS ────────────────────────────────────────────────────────────
# Additional focused searches

custom_topics:
  - name: "AI Economics"
    any: ["AI economy", "structural change", "future of work", "post-scarcity", "AI impact"]
    min_likes: 30
    max_results: 15

  - name: "Agent Architecture"
    any: ["AI agent", "agentic", "multi-agent", "agent framework", "autonomous agent"]
    require: ["architecture", "design", "implementation"]
    min_likes: 20
    max_results: 15


# ─── OUTPUT ───────────────────────────────────────────────────────────────────

output:
  digest_dir: "digests"
  keep_days: 30
