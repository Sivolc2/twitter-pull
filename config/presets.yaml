# Topic presets — query packs for common interests.
# Users reference these by name in feed.yaml. Edit queries here to tune results.
# Each preset runs as separate searches and gets its own digest section.
# DAILY CAP: ~100 posts total across all presets

presets:
  # ─── NEW FOCUSED PRESETS ───────────────────────────────────────────────────

  ai_engineering:
    label: "AI Engineering"
    description: "LLMs, coding assistants, AI development"
    queries:
      - "(\"Claude Code\" OR \"Cursor\" OR \"Codex\" OR \"GitHub Copilot\" OR \"Windsurf\") lang:en -is:retweet min_faves:20"
      - "(LLM OR \"language model\") (engineering OR architecture OR training OR inference) lang:en -is:retweet min_faves:30"
      - "(RAG OR \"function calling\" OR \"tool use\" OR MCP OR prompt) (engineering OR pattern) lang:en -is:retweet min_faves:25"
    max_results: 20  # ~20 posts

  design_eng:
    label: "Design Engineering"
    description: "UI/UX, design systems, component libraries"
    queries:
      - "(shadcn OR \"design system\" OR \"component library\" OR Tailwind) lang:en -is:retweet min_faves:30"
      - "(\"design engineering\" OR \"design engineer\" OR \"interface design\") lang:en -is:retweet min_faves:20"
    max_results: 15  # ~15 posts

  dev_tools:
    label: "Developer Tools"
    description: "Platforms, databases, frameworks, tooling"
    queries:
      - "(Vercel OR Cloudflare OR \"edge functions\" OR serverless) (launch OR release OR feature) lang:en -is:retweet min_faves:30"
      - "(Bun OR Deno OR Node.js OR Vite OR Next.js) (update OR release OR performance) lang:en -is:retweet min_faves:25"
      - "(Convex OR Turso OR PlanetScale OR Supabase OR Neon) database lang:en -is:retweet min_faves:20"
    max_results: 20  # ~20 posts

  startups:
    label: "Startups & Product"
    description: "Founders, product velocity, venture, market moves"
    queries:
      - "(\"product velocity\" OR \"ship faster\" OR \"0 to 1\" OR PMF) lang:en -is:retweet min_faves:40"
      - "(YC OR \"Y Combinator\" OR \"seed round\" OR \"Series A\") (launch OR raised OR funded) lang:en -is:retweet min_faves:30"
    max_results: 20  # ~20 posts

  # ─── ORIGINAL PRESETS (kept for reference) ────────────────────────────────
  ai_news:
    label: "AI News"
    description: "Model releases, research papers, industry moves"
    queries:
      - "(AI OR LLM OR \"large language model\") (launch OR release OR \"new model\") lang:en -is:retweet min_faves:20"
      - "(GPT OR Claude OR Gemini OR Llama OR Mistral OR Grok) (update OR release OR benchmark) lang:en -is:retweet min_faves:20"
    max_results: 80

  ai_building:
    label: "Building with AI"
    description: "Tools, techniques, and tips for building AI products"
    queries:
      - "(cursor OR \"claude code\" OR windsurf OR copilot) (tip OR trick OR tutorial OR workflow) lang:en -is:retweet min_faves:20"
      - "(RAG OR \"function calling\" OR \"tool use\" OR MCP OR \"AI agent\") (build OR tutorial OR guide) lang:en -is:retweet min_faves:30"
      - "built shipped \"with AI\" lang:en -is:retweet min_faves:50"
    max_results: 80

  startups:
    label: "Startups & Venture"
    description: "Funding rounds, YC, founder insights, market moves"
    queries:
      - "(\"AI startup\" OR \"YC\" OR \"Series A\" OR \"seed round\") (funding OR raised OR launched) lang:en -is:retweet min_faves:30"
      - "(founder OR \"product-market fit\" OR \"go to market\") insight lang:en -is:retweet min_faves:50"
    max_results: 60

  tech_news:
    label: "Tech News"
    description: "Big tech, developer tools, open source, platforms"
    queries:
      - "(Apple OR Google OR Microsoft OR Meta OR Amazon) (launch OR release OR announces) lang:en -is:retweet min_faves:100"
      - "(open source OR developer) (tool OR framework OR release) lang:en -is:retweet min_faves:50"
    max_results: 60

  crypto:
    label: "Crypto & Web3"
    description: "DeFi, protocols, market moves, regulation"
    queries:
      - "(Bitcoin OR Ethereum OR crypto OR DeFi) (regulation OR launch OR protocol) lang:en -is:retweet min_faves:50"
    max_results: 50

  news:
    label: "World News"
    description: "Breaking news and major world events"
    queries:
      - "breaking news lang:en -is:retweet min_faves:100"
      - "\"world news\" today lang:en -is:retweet min_faves:50"
    max_results: 50

  science:
    label: "Science & Research"
    description: "Papers, breakthroughs, climate, biotech"
    queries:
      - "(research OR study OR paper) (breakthrough OR discovery OR published) lang:en -is:retweet min_faves:50"
      - "(climate OR biotech OR longevity OR physics) breakthrough lang:en -is:retweet min_faves:30"
    max_results: 50

  geopolitics:
    label: "Geopolitics"
    description: "International relations, policy, economic shifts"
    queries:
      - "(geopolitics OR policy OR diplomacy OR sanctions) lang:en -is:retweet min_faves:100"
    max_results: 50
