# Technical settings — most users won't need to touch this.
# API keys go in .env, not here.
# Personal feed config (accounts, topics) goes in config/feed.yaml.

# ─── FETCHER BACKEND ──────────────────────────────────────────────────────────
# Options: "getxapi" | "twitterapi_io" | "twscrape"
#
# Cost at ~30k tweets/month:
#   getxapi:       ~$1.50/mo  — recommended, pay-as-you-go
#   twitterapi_io: ~$4.50/mo  — reliable fallback
#   twscrape:      free       — fragile, needs real Twitter accounts
#
fetcher: getxapi

getxapi:
  base_url: "https://api.getxapi.com"
  rate_limit_pause: 1.0

twitterapi_io:
  base_url: "https://api.twitterapi.io/twitter"
  rate_limit_pause: 1.0

twscrape:
  accounts_db: "data/twscrape_accounts.db"

# ─── SUMMARIZATION ────────────────────────────────────────────────────────────
summarizer:
  provider: anthropic          # "anthropic" | "openai" | "none"
  model: claude-sonnet-4-6
  max_tokens: 2048
  batch_size: 50               # max tweets per summarization call

# ─── DEDUPLICATION ────────────────────────────────────────────────────────────
storage:
  seen_ids_db: "data/seen_ids.db"
  dedup_window_days: 7

# ─── ACCOUNTS ─────────────────────────────────────────────────────────────────
accounts:
  max_results_per_account: 20
